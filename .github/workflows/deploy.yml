name: CI/CD Pipeline - Build & Deploy

on:
  push:
    branches:
      - master          # Tự động deploy khi push lên main
  pull_request:
    branches:
      - master    # Chỉ build/test khi có PR (không deploy)

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: qltt-lophoc                   # Tên image trên DockerHub
  IMAGE_TAG: ${{ github.sha }}              # Tag = commit SHA (traceability)

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker image lên DockerHub
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login vào DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Thiết lập Docker Buildx (multi-platform)
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}   # Chỉ push khi merge vào main
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha          # Dùng GitHub Actions cache → build nhanh hơn
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: Trigger deploy trên Render.com
  # ─────────────────────────────────────────────
  deploy-to-render:
    name: 🚀 Deploy lên Render.com
    runs-on: ubuntu-latest
    needs: build-and-push                   # Chạy SAU khi build thành công
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'  # Chỉ deploy khi merge vào main

    steps:
      - name: 🔔 Trigger Render Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json" \
            --fail \
            --retry 3 \
            --retry-delay 5
          echo "✅ Deploy hook triggered thành công!"

      - name: ✅ Thông báo deploy
        run: |
          echo "🎉 Deploy lên Render.com đã được kích hoạt!"
          echo "📦 Image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "🔗 Kiểm tra tại: https://dashboard.render.com"